<!DOCTYPE html>
<<html lang="pt" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Utilizadores</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

<body>

    <header class="main-header">
        <h2>Gestão de Utilizadores</h2>
    </header>

    <nav class="main-nav">
        <a href="/" class='card'>
            <div class='card-content'>
                <span class="material-symbols-outlined">home</span>
            </div>
        </a>
        <a href="/reservas" class='card'>
            <div class='card-content'>
                <h4>Reservas</h4>
            </div>
        </a>
        <a href="/clientes" class='card'>
            <div class='card-content'>
                <h4>Clientes</h4>
            </div>
        </a>
        <a href="/mesas" class='card' th:if="${utilizador.perfil == 'GERENTE' or utilizador.perfil == 'ADMIN'}">
            <div class='card-content'>
                <h4>Mesas</h4>
            </div>
        </a>
        <a href="/funcionarios" class='card' th:if="${utilizador.perfil == 'GERENTE' or utilizador.perfil == 'ADMIN'}">
            <div class='card-content'>
                <h4>Funcionários</h4>
            </div>
        </a>
        <a href="/gerentes" class='card' th:if="${utilizador.perfil == 'ADMIN'}">
            <div class='card-content'>
                <h4>Gerentes</h4>
            </div>
        </a>
        <a href="/notificacoes" class='card'>
            <div class='card-content'>
                <h4>Notificações</h4>
            </div>
        </a>
        <a href="/utilizadores" class='card' th:if="${utilizador.perfil == 'ADMIN'}">
            <div class='card-content'>
                <h4>Utilizadores</h4>
            </div>
        </a>
        <a href="/logout" class='card'>
            <div class='card-content'>
                <h4 th:text="'Utilizador: ' + ${utilizador.nome} + ' (' + ${utilizador.perfil} + ')' + '  ⏻ '">PerfilLogout</h4>
            </div>
        </a>
    </nav>

    <div id="tabelaUtilizadores">
        <h3 th:text = "${mensagem}">Perfil do Utilizador</h3>
        <table>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Perfil</th>
            </tr>

            <tr th:each="u : ${lista}">
                <td class="coluna-nome" th:text="${u.nome}"></td>
                <td class="coluna-email" th:text="${u.email}"></td>
                <td class="coluna-perfil"  th:text="${u.perfil}"></td>
            </tr>
        </table>
    </div>

    <div class="accoes">
        <button class="botao" onclick="toggleTabelaUtilizador()">Mostrar/Esconder Tabela</button>
        <button class="botao" onclick="mostrarNovoUtilizador()">Inserir Novo Utilizador</button>
    </div>

    <div id="novoUtilizador" style="display: none">

        <form action="/utilizadores" method="post" class="form-container">
            <h3>Novo Utilizador</h3>

            <div>
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
            </div>
            <div>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>
            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <div>
                <label for="perfil">Perfil:</label>
                <select id="perfil" name="perfil" required>
                    <option value="" disabled selected>Selecione o Perfil...</option>
                    <option value="ADMIN">Administrador</option>
                    <option value="GERENTE">Gerente</option>
                    <option value="FUNCIONARIO">Funcionário</option>
                </select>
            </div>
            <button type="submit">Adicionar Utilizador</button>
        </form>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
