<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Reservas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

<body>

    <header class="main-header">
        <h2>Gestão de Reservas</h2>
    </header>

    <nav class="main-nav">
        <a href="/" class='card'>
            <div class='card-content'>
                <span class="material-symbols-outlined">home</span>
            </div>
        </a>
        <a href="/reservas" class='card'>
            <div class='card-content'>
                <h4>Reservas</h4>
            </div>
        </a>
        <a href="/clientes" class='card'>
            <div class='card-content'>
                <h4>Clientes</h4>
            </div>
        </a>
        <a href="/mesas" class='card'>
            <div class='card-content'>
                <h4>Mesas</h4>
            </div>
        </a>
        <a href="/funcionarios" class='card'>
            <div class='card-content'>
                <h4>Funcionários</h4>
            </div>
        </a>
        <a href="/gerentes" class='card'>
            <div class='card-content'>
                <h4>Gerentes</h4>
            </div>
        </a>
        <a href="/notificacoes" class='card'>
            <div class='card-content'>
                <h4>Notificações</h4>
            </div>
        </a>
    </nav>

    <div id="tabelaReservas">
        <h3 th:text = "${mensagem}">Lista de Reservas</h3>
        <table>
            <tr>
                <th>Data</th>
                <th>Hora</th>
                <th>Número de Pessoas</th>
                <th>Estado</th>
                <th>Cliente</th>
                <th>Funcionário</th>
                <th>Gerente</th>
                <th>Mesa</th>
            </tr>

            <tr th:each="r : ${lista}">
                <td class="coluna-data"  th:text="${r.data != null ? #temporals.format(r.data, 'dd/MM/yyyy') : ''}"></td>
                <td class="coluna-hora" th:text="${r.hora}"></td>
                <td class="coluna-numPessoas"  th:text="${r.numPessoas}"></td>
                <td class="coluna-estado" th:text="${r.estado}"></td>
                <td class="coluna-cliente" th:text="${r.cliente.nome}"></td>
                <td class="coluna-funcionario" th:text="${r.funcionario.nome}"></td>
                <td class="coluna-gerente" th:text="${r.gerente.nome}"></td>
                <td class="coluna-mesa" th:text="${r.mesa.numeroMesa}"></td>
            </tr>
        </table>
    </div>

    <div class="accoes">
        <button class="botao" onclick="marcarReserva()">Destacar Reservas</button>
        <button class="botao" onclick="toggleTabelaReservas()">Mostrar/Esconder Tabela</button>
        <button class="botao" onclick="mostrarNovaReserva()">Inserir Nova Reserva</button>
    </div>

    <div id="novaReserva" style="display: none">
        <form action="/reservas" method="post" class="form-container">
            <h3>Nova Reserva</h3>

            <div>
                <label for="cliente">Cliente:</label>
                <select name="cliente" id="cliente">
                    <option th:each = "cliente: ${clientes}"
                            th:value="${cliente.idCliente}"
                            th:text = "${cliente.nome}">
                    </option>
                </select>
            </div>
            <div>
                <label for="funcionario">Funcionário Responsável:</label>
                <select name="funcionario" id="funcionario">
                    <option th:each = "funcionario : ${funcionarios}"
                            th:value="${funcionario.idFuncionario}"
                            th:text = "${funcionario.nome}">
                    </option>
                </select>
            </div>
            <div>
                <label for="gerente">Gerente de Turno:</label>
                <select name="gerente" id="gerente">
                    <option th:each = "gerente : ${gerentes}"
                            th:value="${gerente.idGerente}"
                            th:text = "${gerente.nome}">
                    </option>
                </select>
            </div>
            <div>
                <label for="mesa">Nº Mesa:</label>
                <select name="mesa" id="mesa">
                    <option th:each = "mesa : ${mesas}"
                            th:value="${mesa.idMesa}"
                            th:text = "${mesa.numeroMesa}">
                    </option>
                </select>
            </div>
            <div>
                <label for="data">Data e Hora:</label>
                <input type="date" id="data" name="data" required>
                <input type="time" id="hora" name="hora" required>
            </div>
            <div>
                <label for="numPessoas">Número de Pessoas:</label>
                <input type="number" id="numPessoas" name="numPessoas" min="1" placeholder="Ex: 4">
            </div>
            <div>
                <label for="estado">Estado da Reserva:</label>
                <select name="estado" id="estado">
                    <option value="em_progresso">Em progresso</option>
                    <option value="concluido">Concluído</option>
                    <option value="cancelado">Cancelado</option>
                </select>
            </div>

            <button type="submit">Adicionar Reserva</button>

        </form>
        <script th:src="@{/js/script.js}"></script>
    </div>

</body>
</html>
