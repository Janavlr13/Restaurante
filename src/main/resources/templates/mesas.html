<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Mesas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

<body>

    <header class="main-header">
        <h2>Gestão de Mesas</h2>
    </header>

    <nav class="main-nav">
        <a href="/" class='card'>
            <div class='card-content'>
                <span class="material-symbols-outlined">home</span>
            </div>
        </a>
        <a href="/reservas" class='card'>
            <div class='card-content'>
                <h4>Reservas</h4>
            </div>
        </a>
        <a href="/clientes" class='card'>
            <div class='card-content'>
                <h4>Clientes</h4>
            </div>
        </a>
        <a href="/mesas" class='card' th:if="${utilizador.perfil == 'GERENTE' or utilizador.perfil == 'ADMIN'}">
            <div class='card-content'>
                <h4>Mesas</h4>
            </div>
        </a>
        <a href="/funcionarios" class='card' th:if="${utilizador.perfil == 'GERENTE' or utilizador.perfil == 'ADMIN'}">
            <div class='card-content'>
                <h4>Funcionários</h4>
            </div>
        </a>
        <a href="/gerentes" class='card' th:if="${utilizador.perfil == 'ADMIN'}">
            <div class='card-content'>
                <h4>Gerentes</h4>
            </div>
        </a>
        <a href="/notificacoes" class='card'>
            <div class='card-content'>
                <h4>Notificações</h4>
            </div>
        </a>
        <a href="/utilizadores" class='card' th:if="${utilizador.perfil == 'ADMIN'}">
            <div class='card-content'>
                <h4>Utilizadores</h4>
            </div>
        </a>
        <a href="/logout" class='card'>
            <div class='card-content'>
                <h4 th:text="'Utilizador: ' + ${utilizador.nome} + ' (' + ${utilizador.perfil} + ')' + '  ⏻ '">PerfilLogout</h4>
            </div>
        </a>
    </nav>

    <div id="tabelaMesas">
        <h3 th:text = "${mensagem}">Lista de Mesas</h3>
        <table>
            <tr>
                <th>Número da Mesa</th>
                <th>Capacidade (Lugares)</th>
                <th>Situação de Uso</th>
            </tr>

            <tr th:each="m : ${lista}">
                <td class="coluna-numeroMesa" th:text="${m.numeroMesa}"></td>
                <td class="coluna-capacidade" th:text="${m.capacidade}"></td>
                <td th:class="${'coluna-situacao ' + m.situacao}" th:text="${m.situacao}"></td>
            </tr>
        </table>
    </div>

    <div class="accoes">
        <button class="botao" onclick="marcarMesa()">Destacar Mesas</button>
        <button class="botao" onclick="toggleTabelaMesas()">Mostrar/Esconder Tabela</button>
        <button class="botao" onclick="mostrarNovaMesa()">Inserir Nova Mesa</button>
    </div>

    <div id="novaMesa" style="display: none">

        <form action="/mesas" method="post" class="form-container">
            <h3>Nova Mesa</h3>

            <div>
                <label for="numeroMesa">Número da Mesa:</label>
                <input type="number" id="numeroMesa" name="numeroMesa" min="1" placeholder="Ex: 5" required>
            </div>

            <div>
                <label for="capacidade">Capacidade (Lugares):</label>
                <input type="number" id="capacidade" name="capacidade" min="1" max="20" placeholder="Ex: 4" required>
            </div>

            <div>
                <label for="situacao">Situação Inicial:</label>
                <select name="situacao" id="situacao">
                    <option value="Livre">Livre</option>
                    <option value="Ocupada">Ocupada</option>
                    <option value="Reservada">Reservada</option>
                    <option value="Manutenção">Em Manutenção</option>
                </select>
            </div>

            <button type="submit">Adicionar Mesa</button>

        </form>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
